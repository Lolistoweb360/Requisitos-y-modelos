<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña - BITE-NOW</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="screen">
    <button class="back-btn" onclick="window.location.href='login.html'">←</button>

    <h2>Reset Password</h2>
    <p class="subtitle">We'll send you a recovery link</p>

    <div id="step1">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="your@email.com">
        </div>
        <button class="btn-primary" onclick="sendLink()">Send Link</button>
    </div>

    <div id="step2" style="display:none">
        <div class="form-group">
            <label>New Password</label>
            <input type="password" id="new_password" placeholder="Create a secure password">
        </div>
        <button class="btn-primary" onclick="resetPassword()">Change Password</button>
    </div>

    <div id="msg" class="msg"></div>

    <div class="links"><a href="login.html">Back to Login</a></div>
</div>

<script>
const API = "http://127.0.0.1:5001/api/auth";
    const params = new URLSearchParams(window.location.search);
    const token  = params.get("token");

    if (token) {
        document.getElementById("step1").style.display = "none";
        document.getElementById("step2").style.display = "block";
    }

    async function sendLink() {
        const email = document.getElementById("email").value.trim();
        if (!email) { showMsg("El correo es obligatorio", "error"); return; }

        try {
            const res  = await fetch(`${API}/forgot-password`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            showMsg(res.ok ? data.message : data.error, res.ok ? "success" : "error");
        } catch {
            showMsg("Error al conectar con el servidor", "error");
        }
    }

    async function resetPassword() {
        const new_password = document.getElementById("new_password").value.trim();
        if (!new_password) { showMsg("La contraseña es obligatoria", "error"); return; }

        try {
            const res  = await fetch(`${API}/reset-password`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ token, new_password })
            });
            const data = await res.json();

            if (res.ok) {
                showMsg("Contraseña actualizada. Redirigiendo...", "success");
                setTimeout(() => window.location.href = "login.html", 2000);
            } else {
                showMsg(data.error, "error");
            }
        } catch {
            showMsg("Error al conectar con el servidor", "error");
        }
    }

    function showMsg(text, type) {
        const el = document.getElementById("msg");
        el.textContent = text;
        el.className = `msg ${type}`;
    }
</script>
</body>
</html>
