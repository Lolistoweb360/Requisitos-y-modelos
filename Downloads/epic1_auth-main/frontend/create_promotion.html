<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Publicar promoción</title>
  <link rel="stylesheet" href="app.css"/>
  <link rel="icon" href="data:,">
</head>
<body>
  <div class="container">
    <div class="nav">
      <div class="brand">Publicar promoción</div>
      <div class="right">
        <button class="btn-outline" onclick="window.location.href='home.html'">Volver</button>
        <button class="btn-danger btn-outline" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <h2>US-06</h2>
      <p>Solo rol <b>RESTAURANT</b>. La imagen debe terminar en <code>.jpg/.png/.webp</code>.</p>

      <div class="row">
        <input id="name" placeholder="Nombre (ej. Promo 2x1)"/>
        <input id="image_url" placeholder="Image URL (https://... .jpg)"/>
      </div>
      <div style="margin-top:12px;">
        <textarea id="description" placeholder="Descripción"></textarea>
      </div>

      <div class="row" style="margin-top:12px;">
        <input id="price" type="number" step="0.01" placeholder="Precio"/>
        <input id="stock" type="number" step="1" placeholder="Stock"/>
      </div>

      <div class="row" style="margin-top:12px;">
        <input id="start_date" placeholder="Inicio (YYYY-MM-DD)"/>
        <input id="end_date" placeholder="Fin (YYYY-MM-DD) - debe ser futuro"/>
      </div>

      <div style="display:flex; gap:10px; margin-top:14px; flex-wrap:wrap;">
        <button class="btn" onclick="createPromotion()">Publicar</button>
      </div>

      <div id="msg" class="msg"></div>
      <div class="small" id="created"></div>
    </div>
  </div>

  <script src="common.js"></script>
  <script>
    async function createPromotion(){
      const t = requireAuth(); if(!t) return;

      const payload = {
        name: document.getElementById("name").value.trim(),
        description: document.getElementById("description").value.trim(),
        price: document.getElementById("price").value,
        stock: document.getElementById("stock").value,
        image_url: document.getElementById("image_url").value.trim(),
        start_date: document.getElementById("start_date").value.trim(),
        end_date: document.getElementById("end_date").value.trim(),
      };

      const { res, data } = await apiFetch("/promotions", { method:"POST", body: payload });

      if(!res.ok){
        showMsg("msg", data.error || `Error (status ${res.status})`, "error");
        return;
      }

      showMsg("msg", "Promoción creada correctamente.", "success");
      document.getElementById("created").innerHTML =
        `ID de promoción: <code>${data.id}</code> (guárdalo para reservar)`;
    }
  </script>
</body>
</html>
