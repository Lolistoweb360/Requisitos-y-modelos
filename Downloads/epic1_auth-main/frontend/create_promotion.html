<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crear promoción</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="screen">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
      <h2>Crear promoción</h2>
      <button class="btn-outline" onclick="window.location.href='home.html'">Volver</button>
    </div>

    <div id="msg" class="msg"></div>

<input id="name" placeholder="Nombre de la promo" />
<input id="description" placeholder="Descripción" />
<input id="price" type="number" step="0.01" placeholder="Precio" />
<input id="stock" type="number" step="1" placeholder="Stock" />
<input id="image_url" placeholder="Image URL (debe terminar en .jpg/.png/.webp)" />
<input id="start_date" placeholder="Fecha inicio (YYYY-MM-DD)" />
<input id="end_date" placeholder="Fecha fin (YYYY-MM-DD)" />

    <button onclick="createPromotion()">Guardar</button>
  </div>

  <script src="create_promotion.js"></script>
</body>
</html>
