<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Promociones – BITE-NOW</title>
  <link rel="stylesheet" href="app.css"/>
  <link rel="icon" href="data:,">
  <style>
    .promo-grid {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap:16px;
      margin-top:16px;
    }
    .promo-card {
      border:1px solid var(--border);
      border-radius:18px;
      background:rgba(255,255,255,.92);
      overflow:hidden;
      box-shadow:0 2px 8px rgba(239,68,68,.06);
      display:flex;
      flex-direction:column;
    }
    .promo-img {
      width:100%; height:150px;
      background:#fef2f2;
      display:flex; align-items:center; justify-content:center;
      color:var(--muted); font-size:13px;
      overflow:hidden;
    }
    .promo-img img { width:100%; height:150px; object-fit:cover; display:block; }
    .promo-body { padding:14px; flex:1; display:flex; flex-direction:column; gap:6px; }
    .promo-name { font-weight:700; font-size:16px; color:#111827; }
    .promo-desc { font-size:13px; color:var(--muted); line-height:1.4; }
    .promo-meta { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
    .badge {
      font-size:12px; padding:3px 9px;
      border-radius:999px; font-weight:600;
    }
    .badge-price { background:rgba(239,68,68,.1); color:#b91c1c; }
    .badge-stock { background:rgba(59,130,246,.1); color:#1e40af; }
    .badge-date  { background:rgba(107,114,128,.1); color:#374151; }
    .reserve-btn {
      margin-top:auto;
      width:100%; padding:10px;
      border-radius:10px; border:0; cursor:pointer;
      font-weight:700; font-size:14px;
      background:linear-gradient(135deg,#ef4444,#b91c1c);
      color:#fff; transition:opacity .15s;
    }
    .reserve-btn:hover:not(:disabled) { opacity:.88; }
    .reserve-btn:disabled { background:#d1d5db; color:#9ca3af; cursor:not-allowed; }
    .reserve-btn.reserved { background:rgba(5,150,105,.15); color:#065f46; border:1px solid rgba(5,150,105,.3); }

    .section-title {
      font-size:18px; font-weight:700;
      margin:30px 0 12px;
      border-bottom:2px solid rgba(239,68,68,.2);
      padding-bottom:6px; color:#7f1d1d;
    }
    .res-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:12px 16px; border:1px solid var(--border); border-radius:12px;
      margin-bottom:8px; background:rgba(255,255,255,.85);
      flex-wrap:wrap; gap:8px;
    }
    .res-info { display:flex; flex-direction:column; gap:2px; }
    .res-name { font-weight:600; font-size:14px; }
    .res-date { font-size:12px; color:var(--muted); }
    .coupon-code {
      font-family:monospace; font-size:15px; letter-spacing:2px;
      background:rgba(239,68,68,.08); padding:5px 12px;
      border-radius:8px; color:#7f1d1d; font-weight:700;
    }
    .empty { color:var(--muted); font-size:14px; padding:24px 0; text-align:center; }

    /* Success modal */
    .modal-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.45); z-index:200;
      align-items:center; justify-content:center;
    }
    .modal-overlay.active { display:flex; }
    .modal {
      background:#fff; border-radius:20px; padding:32px 28px;
      max-width:380px; width:90%; text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,.15);
    }
    .modal h3 { margin:0 0 6px; color:#111827; font-size:20px; }
    .modal p  { color:var(--muted); font-size:14px; margin:0 0 6px; }
    .coupon-big {
      font-size:28px; font-family:monospace; font-weight:800;
      color:#b91c1c; letter-spacing:3px; margin:18px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <div class="brand">BITE-NOW</div>
      <div class="right">
        <div class="pill" id="who">...</div>
        <button class="btn-outline" id="publish-btn" style="display:none"
                onclick="window.location.href='publish_promotion.html'">+ Publicar</button>
        <button class="btn-outline" onclick="window.location.href='home.html'">Inicio</button>
        <button class="btn-danger btn-outline" onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- Promotions section -->
    <div class="section-title">Promociones Activas</div>
    <div id="promos-loading" class="empty">Cargando promociones…</div>
    <div class="promo-grid" id="promo-grid"></div>

    <!-- My Reservations section -->
    <div class="section-title">Mis Reservas</div>
    <div id="reservations-loading" class="empty">Cargando reservas…</div>
    <div id="reservations-list"></div>
  </div>

  <!-- Success modal -->
  <div class="modal-overlay" id="modal" onclick="maybeCloseModal(event)">
    <div class="modal">
      <h3>🎉 ¡Reserva exitosa!</h3>
      <p>Tu código de cupón:</p>
      <div class="coupon-big" id="modal-coupon">————</div>
      <p>Guarda este código para canjear tu promoción.</p>
      <button class="btn" style="width:100%;margin-top:4px;"
              onclick="document.getElementById('modal').classList.remove('active')">
        Cerrar
      </button>
    </div>
  </div>

  <script src="common.js"></script>
  <script>
    requireAuth();
    const u = getUser();
    document.getElementById("who").textContent = u?.role ? `Rol: ${u.role}` : "Sesión";
    if (u?.role === "RESTAURANT") document.getElementById("publish-btn").style.display = "";

    let myReservedIds = new Set();

    function maybeCloseModal(e) {
      if (e.target === document.getElementById("modal"))
        document.getElementById("modal").classList.remove("active");
    }

    function fmtDate(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleString("es-ES", {
        day:"2-digit", month:"short", year:"numeric",
        hour:"2-digit", minute:"2-digit"
      });
    }

    function renderPromos(promos) {
      const grid = document.getElementById("promo-grid");
      document.getElementById("promos-loading").style.display = "none";
      if (!promos.length) {
        grid.innerHTML = '<div class="empty">No hay promociones activas en este momento.</div>';
        return;
      }
      grid.innerHTML = promos.map(p => {
        const imgHtml = p.image_url
          ? `<div class="promo-img"><img src="${escHtml(p.image_url)}" alt="${escHtml(p.name)}"
               onerror="this.style.display='none';this.parentElement.setAttribute('data-empty','1')"/></div>`
          : `<div class="promo-img"><span>Sin imagen</span></div>`;

        const isMine    = myReservedIds.has(p.id);
        const isSoldOut = p.status === "SOLD_OUT" || p.stock <= 0;

        let btnHtml;
        if (isMine) {
          btnHtml = `<button class="reserve-btn reserved" disabled>✓ Ya reservada</button>`;
        } else if (isSoldOut) {
          btnHtml = `<button class="reserve-btn" disabled>Agotada</button>`;
        } else {
          btnHtml = `<button class="reserve-btn" id="rbtn-${p.id}"
                       onclick="reserve('${escHtml(p.id)}')">Reservar</button>`;
        }

        return `
          <div class="promo-card" id="card-${p.id}">
            ${imgHtml}
            <div class="promo-body">
              <div class="promo-name">${escHtml(p.name)}</div>
              <div class="promo-desc">${escHtml(p.description)}</div>
              <div class="promo-meta">
                <span class="badge badge-price">$${parseFloat(p.price).toFixed(2)}</span>
                <span class="badge badge-stock">${p.stock} disponibles</span>
                <span class="badge badge-date">Hasta ${fmtDate(p.valid_until)}</span>
              </div>
              <div id="pmsg-${p.id}" class="msg" style="margin:6px 0 0;"></div>
              ${btnHtml}
            </div>
          </div>`;
      }).join("");
    }

    function renderReservations(reservations) {
      const list = document.getElementById("reservations-list");
      document.getElementById("reservations-loading").style.display = "none";
      if (!reservations.length) {
        list.innerHTML = '<div class="empty">No tienes reservas aún.</div>';
        return;
      }
      list.innerHTML = reservations.map(r => {
        const name = r.promotion ? escHtml(r.promotion.name) : escHtml(r.promotion_id);
        const until = r.promotion ? fmtDate(r.promotion.valid_until) : "—";
        return `
          <div class="res-row">
            <div class="res-info">
              <div class="res-name">${name}</div>
              <div class="res-date">Válido hasta: ${until}</div>
            </div>
            <div class="coupon-code">${escHtml(r.coupon_code)}</div>
          </div>`;
      }).join("");
    }

    async function reserve(promoId) {
      const btn = document.getElementById(`rbtn-${promoId}`);
      if (btn) { btn.disabled = true; btn.textContent = "Reservando…"; }

      const { res, data } = await apiFetch(`/promotions/${promoId}/reserve`, { method: "POST" });

      if (!res.ok) {
        if (btn) { btn.disabled = false; btn.textContent = "Reservar"; }
        showMsg(`pmsg-${promoId}`, data.error || `Error ${res.status}`, "error");
        return;
      }

      myReservedIds.add(promoId);
      if (btn) { btn.className = "reserve-btn reserved"; btn.textContent = "✓ Ya reservada"; }
      document.getElementById("modal-coupon").textContent = data.coupon_code;
      document.getElementById("modal").classList.add("active");
      loadReservations();
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    async function loadPromos() {
      const { res, data } = await apiFetch("/promotions");
      if (!res.ok) {
        document.getElementById("promos-loading").textContent = "Error al cargar promociones.";
        return;
      }
      renderPromos(Array.isArray(data) ? data : []);
    }

    async function loadReservations() {
      const { res, data } = await apiFetch("/promotions/my-reservations");
      if (!res.ok) {
        document.getElementById("reservations-loading").textContent = "Error al cargar reservas.";
        return;
      }
      const reservations = Array.isArray(data) ? data : [];
      myReservedIds = new Set(reservations.map(r => r.promotion_id));
      renderReservations(reservations);
    }

    // Load reservations first (to mark already-reserved promos), then promos
    async function init() {
      await loadReservations();
      await loadPromos();
    }
    init();
  </script>
</body>
</html>
